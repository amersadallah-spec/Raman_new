name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - uses: actions/checkout@v3

    - name: Create Project & Insert App Code
      run: |
        flutter create . --org com.raman.app --project-name my_app
        
        # تفعيل اتصالات HTTP غير المشفرة للاتصال بصفحة الراوتر المحلية
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
        
        cat << 'EOF' > pubspec.yaml
        name: my_app
        description: "A new Flutter project for home network control."
        publish_to: 'none'
        version: 1.0.0+1

        environment:
          sdk: '>=3.0.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter
          shared_preferences: ^2.2.2
          url_launcher: ^6.2.2

        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^3.0.0

        flutter:
          uses-material-design: true
        EOF

        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';
        import 'package:shared_preferences/shared_preferences.dart';
        import 'package:url_launcher/url_launcher.dart';

        void main() {
          runApp(const HomeNetworkApp());
        }

        class HomeNetworkApp extends StatelessWidget {
          const HomeNetworkApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              debugShowCheckedModeBanner: false,
              title: 'إدارة شبكة الراوتر المنزلي',
              theme: ThemeData(primarySwatch: Colors.indigo, useMaterial3: true),
              home: const MainNavigationScreen(),
            );
          }
        }

        class MainNavigationScreen extends StatefulWidget {
          const MainNavigationScreen({super.key});

          @override
          State<MainNavigationScreen> createState() => _MainNavigationScreenState();
        }

        class _MainNavigationScreenState extends State<MainNavigationScreen> {
          int _currentIndex = 0;

          void navigateToTab(int index) {
            setState(() {
              _currentIndex = index;
            });
          }

          @override
          Widget build(BuildContext context) {
            final List<Widget> screens = [
              RouterBridgeScreen(onNavigate: navigateToTab),
              const NetworkControlScreen(),
            ];

            return Scaffold(
              body: screens[_currentIndex],
              bottomNavigationBar: BottomNavigationBar(
                currentIndex: _currentIndex,
                onTap: (index) {
                  setState(() {
                    _currentIndex = index;
                  });
                },
                selectedItemColor: Colors.indigo,
                items: const [
                  BottomNavigationBarItem(
                    icon: Icon(Icons.link),
                    label: 'ربط الراوتر 1',
                  ),
                  BottomNavigationBarItem(
                    icon: Icon(Icons.dashboard),
                    label: 'لوحة التحكم 2',
                  ),
                ],
              ),
            );
          }
        }

        // الصفحة الأولى: بوابة الاتصال وفتح صفحة الراوتر لتسجيل الجلسة
        class RouterBridgeScreen extends StatelessWidget {
          final Function(int) onNavigate;

          const RouterBridgeScreen({super.key, required this.onNavigate});

          Future<void> _launchRouter(BuildContext context) async {
            final Uri url = Uri.parse('http://192.168.100.1');
            try {
              if (!await launchUrl(url, mode: LaunchMode.externalApplication)) {
                throw 'Could not launch $url';
              }
            } catch (e) {
              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(content: Text('تعذر فتح الصفحة: $e')),
              );
            }
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('الخطوة 1: بوابة ربط الراوتر', style: TextStyle(color: Colors.white, fontSize: 16)),
                backgroundColor: Colors.indigo,
                centerTitle: true,
              ),
              body: Center(
                child: Padding(
                  padding: const EdgeInsets.all(24.0),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const Icon(Icons.wifi_tethering, size: 80, color: Colors.indigo),
                      const SizedBox(height: 20),
                      const Text(
                        'تفعيل اتصال الراوتر (Huawei HG8245H)',
                        style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold, color: Colors.indigo),
                        textAlign: TextAlign.center,
                      ),
                      const SizedBox(height: 12),
                      const Text(
                        '1. انقر على الزر أدناه لفتح صفحة الراوتر وتسجيل الدخول عبر المتصفح.\n2. بعد فتح الصفحة واتصال الجلسة، انتقل مباشرة إلى "لوحة التحكم" للتحكم بالأجهزة.',
                        style: TextStyle(fontSize: 14, color: Colors.black54, height: 1.5),
                        textAlign: TextAlign.center,
                      ),
                      const SizedBox(height: 30),
                      ElevatedButton.icon(
                        onPressed: () => _launchRouter(context),
                        icon: const Icon(Icons.open_in_browser, size: 24),
                        label: const Text('فتح صفحة الراوتر (192.168.100.1)', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                        style: ElevatedButton.styleFrom(
                          backgroundColor: Colors.indigo,
                          foregroundColor: Colors.white,
                          padding: const EdgeInsets.symmetric(horizontal: 24, vertical: 16),
                          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                        ),
                      ),
                      const SizedBox(height: 16),
                      ElevatedButton.icon(
                        onPressed: () => onNavigate(1), // الانتقال الفوري للصفحة الثانية
                        icon: const Icon(Icons.arrow_forward, size: 22),
                        label: const Text('الانتقال إلى لوحة التحكم بالأجهزة', style: TextStyle(fontSize: 15, fontWeight: FontWeight.bold)),
                        style: ElevatedButton.styleFrom(
                          backgroundColor: Colors.green.shade700,
                          foregroundColor: Colors.white,
                          padding: const EdgeInsets.symmetric(horizontal: 24, vertical: 14),
                          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                        ),
                      ),
                    ],
                  ),
                ),
              ),
            );
          }
        }

        class DeviceItem {
          final String name;
          final String ip;
          bool isBlocked;
          String blockTime;
          final bool isProtected;

          DeviceItem({
            required this.name,
            required this.ip,
            required this.isBlocked,
            required this.blockTime,
            this.isProtected = false,
          });
        }

        // الصفحة الثانية: لوحة التحكم بالأجهزة الموصولة وإدارتها
        class NetworkControlScreen extends StatefulWidget {
          const NetworkControlScreen({super.key});

          @override
          State<NetworkControlScreen> createState() => _NetworkControlScreenState();
        }

        class _NetworkControlScreenState extends State<NetworkControlScreen> {
          bool isGlobalInternetBlocked = false;

          final List<DeviceItem> devices = [
            DeviceItem(name: 'موبايل الأستاذ عامر (Samsung S25 Ultra)', ip: '192.168.100.10', isBlocked: false, blockTime: 'محمي دائماً', isProtected: true),
            DeviceItem(name: 'جهاز ماي تي في (My TV - استثناء)', ip: '192.168.100.15', isBlocked: false, blockTime: 'محمي دائماً', isProtected: true),
            DeviceItem(name: 'هاتف الصالة', ip: '192.168.100.20', isBlocked: false, blockTime: '14:00 - 16:00'),
            DeviceItem(name: 'جهاز اللابتوب', ip: '192.168.100.25', isBlocked: false, blockTime: '22:00 - 06:00'),
            DeviceItem(name: 'جهاز الشاشة الذكية', ip: '192.168.100.30', isBlocked: false, blockTime: '01:00 - 05:00'),
          ];

          @override
          void initState() {
            super.initState();
            _loadSavedData();
          }

          Future<void> _loadSavedData() async {
            final prefs = await SharedPreferences.getInstance();
            setState(() {
              isGlobalInternetBlocked = prefs.getBool('global_block') ?? false;
              for (int i = 2; i < devices.length; i++) {
                devices[i].isBlocked = prefs.getBool('block_$i') ?? false;
                devices[i].blockTime = prefs.getString('time_$i') ?? devices[i].blockTime;
              }
            });
          }

          Future<void> _saveData() async {
            final prefs = await SharedPreferences.getInstance();
            prefs.setBool('global_block', isGlobalInternetBlocked);
            for (int i = 2; i < devices.length; i++) {
              prefs.setBool('block_$i', devices[i].isBlocked);
              prefs.setString('time_$i', devices[i].blockTime);
            }
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('الخطوة 2: لوحة التحكم بالأجهزة', style: TextStyle(color: Colors.white, fontWeight: FontWeight.bold, fontSize: 16)),
                backgroundColor: Colors.indigo,
                centerTitle: true,
              ),
              body: Padding(
                padding: const EdgeInsets.all(16.0),
                child: Column(
                  children: [
                    Container(
                      padding: const EdgeInsets.all(12),
                      decoration: BoxDecoration(
                        color: Colors.indigo.shade50,
                        borderRadius: BorderRadius.circular(10),
                        border: Border.all(color: Colors.indigo.shade200),
                      ),
                      child: const Row(
                        children: [
                          Icon(Icons.info_outline, color: Colors.indigo),
                          SizedBox(width: 10),
                          Expanded(
                            child: Text(
                              'تم الاتصال بجلسة الراوتر بنجاح. يمكنك الآن التحكم بحظر الأجهزة وإدارتها أدناه بسلاسة.',
                              style: TextStyle(fontSize: 12, color: Colors.indigo),
                            ),
                          ),
                        ],
                      ),
                    ),
                    const SizedBox(height: 16),
                    Row(
                      children: [
                        Expanded(
                          child: ElevatedButton.icon(
                            onPressed: () {
                              setState(() {
                                isGlobalInternetBlocked = true;
                                for (var d in devices) {
                                  if (!d.isProtected) d.isBlocked = true;
                                }
                                _saveData();
                              });
                            },
                            icon: const Icon(Icons.block, size: 26),
                            label: const Text('حظر الإنترنت', style: TextStyle(fontSize: 15, fontWeight: FontWeight.bold)),
                            style: ElevatedButton.styleFrom(
                              backgroundColor: isGlobalInternetBlocked ? Colors.red : Colors.red.shade100,
                              foregroundColor: isGlobalInternetBlocked ? Colors.white : Colors.red.shade900,
                              padding: const EdgeInsets.symmetric(vertical: 16),
                              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            ),
                          ),
                        ),
                        const SizedBox(width: 12),
                        Expanded(
                          child: ElevatedButton.icon(
                            onPressed: () {
                              setState(() {
                                isGlobalInternetBlocked = false;
                                for (var d in devices) {
                                  d.isBlocked = false;
                                }
                                _saveData();
                              });
                            },
                            icon: const Icon(Icons.wifi, size: 26),
                            label: const Text('الاتصال بالشبكة', style: TextStyle(fontSize: 15, fontWeight: FontWeight.bold)),
                            style: ElevatedButton.styleFrom(
                              backgroundColor: !isGlobalInternetBlocked ? Colors.green : Colors.green.shade100,
                              foregroundColor: !isGlobalInternetBlocked ? Colors.white : Colors.green.shade900,
                              padding: const EdgeInsets.symmetric(vertical: 16),
                              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            ),
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 20),
                    const Align(
                      alignment: Alignment.centerRight,
                      child: Text('الأجهزة المتصلة بالراوتر:', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold, color: Colors.indigo)),
                    ),
                    const SizedBox(height: 10),
                    Expanded(
                      child: ListView.builder(
                        itemCount: devices.length,
                        itemBuilder: (context, index) {
                          final device = devices[index];
                          return Card(
                            elevation: 3,
                            margin: const EdgeInsets.symmetric(vertical: 8),
                            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            child: Padding(
                              padding: const EdgeInsets.all(12.0),
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  Row(
                                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                    children: [
                                      Row(
                                        children: [
                                          Icon(device.isProtected ? Icons.admin_panel_settings : Icons.devices, color: device.isProtected ? Colors.amber.shade800 : Colors.indigo),
                                          const SizedBox(width: 8),
                                          Column(
                                            crossAxisAlignment: CrossAxisAlignment.start,
                                            children: [
                                              Text(device.name, style: TextStyle(fontWeight: FontWeight.bold, fontSize: 14, color: device.isProtected ? Colors.green.shade800 : Colors.black87)),
                                              Text(device.ip, style: const TextStyle(color: Colors.grey, fontSize: 12)),
                                            ],
                                          ),
                                        ],
                                      ),
                                      Switch(
                                        value: device.isBlocked,
                                        onChanged: device.isProtected ? null : (value) {
                                          setState(() {
                                            device.isBlocked = value;
                                            _saveData();
                                          });
                                        },
                                        activeColor: Colors.red,
                                      ),
                                    ],
                                  ),
                                  const Divider(height: 16),
                                  Row(
                                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                    children: [
                                      Text(
                                        device.isProtected ? 'محمي دائماً (استثناء رئيسي)' : 'وقت الحظر: ${device.blockTime}',
                                        style: TextStyle(fontSize: 12, color: device.isProtected ? Colors.green : Colors.grey.shade700, fontWeight: FontWeight.w500),
                                      ),
                                      if (!device.isProtected)
                                        TextButton.icon(
                                          onPressed: () => _showEditTimeDialog(context, device),
                                          icon: const Icon(Icons.access_time, size: 16),
                                          label: const Text('تعديل التوقيت', style: TextStyle(fontSize: 12)),
                                        ),
                                    ],
                                  ),
                                ],
                              ),
                            ),
                          );
                        },
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          void _showEditTimeDialog(BuildContext context, DeviceItem device) {
            TextEditingController timeController = TextEditingController(text: device.blockTime);
            showDialog(
              context: context,
              builder: (dialogContext) {
                return AlertDialog(
                  title: Text('تعديل وقت الحظر لـ ${device.name}'),
                  content: TextField(
                    controller: timeController,
                    decoration: const InputDecoration(
                      labelText: 'أدخل وقت الحظر (مثال: 22:00 - 06:00)',
                      border: OutlineInputBorder(),
                    ),
                  ),
                  actions: [
                    TextButton(
                      onPressed: () => Navigator.pop(dialogContext),
                      child: const Text('إلغاء'),
                    ),
                    ElevatedButton(
                      onPressed: () {
                        setState(() {
                          device.blockTime = timeController.text;
                          _saveData();
                        });
                        Navigator.pop(dialogContext);
                      },
                      child: const Text('حفظ'),
                    ),
                  ],
                );
              },
            );
          }
        }
        EOF

        flutter pub get
        flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
