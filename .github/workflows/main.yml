name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - uses: actions/checkout@v3

    - name: Create Project & Insert App Code
      run: |
        flutter create . --org com.raman.app --project-name my_app
        
        # تحديث pubspec.yaml لإضافة مكتبات الشبكة
        cat << 'EOF' > pubspec.yaml
        name: my_app
        description: "A new Flutter project for home network control."
        publish_to: 'none'
        version: 1.0.0+1

        environment:
          sdk: '>=3.0.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter
          http: ^1.2.0

        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^3.0.0

        flutter:
          uses-material-design: true
        EOF

        # كتابة كود الواجهة والبحث عن الأجهزة
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';

        void main() {
          runApp(const HomeNetworkApp());
        }

        class HomeNetworkApp extends StatelessWidget {
          const HomeNetworkApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              debugShowCheckedModeBanner: false,
              title: 'إدارة شبكة المنزل',
              theme: ThemeData(primarySwatch: Colors.blue, useMaterial3: true),
              home: const NetworkControlScreen(),
            );
          }
        }

        class NetworkControlScreen extends StatefulWidget {
          const NetworkControlScreen({super.key});

          @override
          State<NetworkControlScreen> createState() => _NetworkControlScreenState();
        }

        class DeviceItem {
          final String name;
          final String ip;
          bool isBlocked;
          String blockTime;
          bool isProtected;

          DeviceItem({
            required this.name,
            required this.ip,
            required this.isBlocked,
            required this.blockTime,
            this.isProtected = false,
          });
        }

        class _NetworkControlScreenState extends State<NetworkControlScreen> {
          bool isGlobalInternetBlocked = false;
          bool isScanning = false;

          // القائمة الأولية للأجهزة مع استثناء موبايل الأستاذ عامر وجهاز My TV
          final List<DeviceItem> devices = [
            DeviceItem(name: 'موبايل الأستاذ عامر (استثناء رئيسي)', ip: '192.168.1.10', isBlocked: false, blockTime: 'محمي دائماً', isProtected: true),
            DeviceItem(name: 'جهاز ماي تي في (My TV - استثناء)', ip: '192.168.1.15', isBlocked: false, blockTime: 'محمي دائماً', isProtected: true),
            DeviceItem(name: 'هاتف الصالة', ip: '192.168.1.20', isBlocked: false, blockTime: '14:00 - 16:00'),
            DeviceItem(name: 'جهاز اللابتوب', ip: '192.168.1.25', isBlocked: false, blockTime: '22:00 - 06:00'),
            DeviceItem(name: 'جهاز الشاشة الذكية', ip: '192.168.1.30', isBlocked: false, blockTime: '01:00 - 05:00'),
          ];

          void _scanNetwork() async {
            setState(() {
              isScanning = true;
            });

            // محاكاة عملية فحص الشبكة والبحث عن الأجهزة الحقيقية المتصلة بالراوتر
            await Future.delayed(const Duration(seconds: 2));

            setState(() {
              isScanning = false;
              // إضافة جهاز جديد تم اكتشافه على الشبكة كمثال بعد الفحص
              if (!devices.any((d) => d.ip == '192.168.1.50')) {
                devices.add(DeviceItem(name: 'جهاز جديد مكتشف على الشبكة', ip: '192.168.1.50', isBlocked: false, blockTime: '02:00 - 04:00'));
              }
            });

            ScaffoldMessenger.of(context).showSnackBar(
              const SnackBar(content: Text('تم اكتمال فحص الشبكة وتحديث الأجهزة بنجاح!')),
            );
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('التحكم بالإنترنت المنزلي', style: TextStyle(color: Colors.white, fontWeight: FontWeight.bold)),
                backgroundColor: Colors.indigo,
                centerTitle: true,
                actions: [
                  IconButton(
                    icon: isScanning 
                        ? const SizedBox(width: 20, height: 20, child: CircularProgressIndicator(color: Colors.white, strokeWidth: 2))
                        : const Icon(Icons.refresh, color: Colors.white),
                    onPressed: isScanning ? null : _scanNetwork,
                    tooltip: 'فحص الشبكة للبحث عن الأجهزة',
                  ),
                ],
              ),
              body: Padding(
                padding: const EdgeInsets.all(16.0),
                child: Column(
                  children: [
                    Row(
                      children: [
                        Expanded(
                          child: ElevatedButton.icon(
                            onPressed: () {
                              setState(() {
                                isGlobalInternetBlocked = true;
                                for (var d in devices) {
                                  if (!d.isProtected) d.isBlocked = true;
                                }
                              });
                            },
                            icon: const Icon(Icons.block, size: 28),
                            label: const Text('حظر الإنترنت', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                            style: ElevatedButton.styleFrom(
                              backgroundColor: isGlobalInternetBlocked ? Colors.red : Colors.red.shade100,
                              foregroundColor: isGlobalInternetBlocked ? Colors.white : Colors.red.shade900,
                              padding: const EdgeInsets.symmetric(vertical: 18),
                              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            ),
                          ),
                        ),
                        const SizedBox(width: 12),
                        Expanded(
                          child: ElevatedButton.icon(
                            onPressed: () {
                              setState(() {
                                isGlobalInternetBlocked = false;
                                for (var d in devices) {
                                  d.isBlocked = false;
                                }
                              });
                            },
                            icon: const Icon(Icons.wifi, size: 28),
                            label: const Text('الاتصال بالإنترنت', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                            style: ElevatedButton.styleFrom(
                              backgroundColor: !isGlobalInternetBlocked ? Colors.green : Colors.green.shade100,
                              foregroundColor: !isGlobalInternetBlocked ? Colors.white : Colors.green.shade900,
                              padding: const EdgeInsets.symmetric(vertical: 18),
                              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            ),
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 16),
                    ElevatedButton.icon(
                      onPressed: isScanning ? null : _scanNetwork,
                      icon: const Icon(Icons.radar),
                      label: Text(isScanning ? 'جاري فحص شبكة المنزل...' : 'فحص الشبكة والبحث عن الأجهزة المتصلة'),
                      style: ElevatedButton.styleFrom(
                        backgroundColor: Colors.indigo.shade50,
                        foregroundColor: Colors.indigo.shade900,
                        minimumSize: const Size.fromHeight(45),
                        shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)),
                      ),
                    ),
                    const SizedBox(height: 12),
                    const Align(
                      alignment: Alignment.centerRight,
                      child: Text('الأجهزة المتصلة بالشبكة:', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold, color: Colors.indigo)),
                    ),
                    const SizedBox(height: 8),
                    Expanded(
                      child: ListView.builder(
                        itemCount: devices.length,
                        itemBuilder: (context, index) {
                          final device = devices[index];
                          return Card(
                            elevation: 3,
                            margin: const EdgeInsets.symmetric(vertical: 8),
                            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            child: Padding(
                              padding: const EdgeInsets.all(12.0),
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  Row(
                                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                    children: [
                                      Row(
                                        children: [
                                          Icon(
                                            device.isProtected ? Icons.admin_panel_settings : Icons.devices, 
                                            color: device.isProtected ? Colors.amber.shade800 : Colors.indigo,
                                          ),
                                          const SizedBox(width: 8),
                                          Column(
                                            crossAxisAlignment: CrossAxisAlignment.start,
                                            children: [
                                              Text(device.name, style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15, color: device.isProtected ? Colors.green.shade800 : Colors.black87)),
                                              Text(device.ip, style: const TextStyle(color: Colors.grey, fontSize: 12)),
                                            ],
                                          ),
                                        ],
                                      ),
                                      Switch(
                                        value: device.isBlocked,
                                        onChanged: device.isProtected ? null : (value) {
                                          setState(() {
                                            device.isBlocked = value;
                                          });
                                        },
                                        activeColor: Colors.red,
                                      ),
                                    ],
                                  ),
                                  const Divider(height: 16),
                                  Row(
                                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                    children: [
                                      Text(
                                        device.isProtected ? 'محمي دائماً (لا يمكن حظره)' : 'وقت الحظر: ${device.blockTime}',
                                        style: TextStyle(fontSize: 12, color: device.isProtected ? Colors.green : Colors.grey.shade700, fontWeight: FontWeight.w500),
                                      ),
                                      if (!device.isProtected)
                                        TextButton.icon(
                                          onPressed: () => _showEditTimeDialog(context, device),
                                          icon: const Icon(Icons.access_time, size: 16),
                                          label: const Text('تعديل التوقيت', style: TextStyle(fontSize: 12)),
                                        ),
                                    ],
                                  ),
                                ],
                              ),
                            ),
                          );
                        },
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          void _showEditTimeDialog(BuildContext context, DeviceItem device) {
            TextEditingController timeController = TextEditingController(text: device.blockTime);
            showDialog(
              context: context,
              builder: (dialogContext) {
                return AlertDialog(
                  title: Text('تعديل وقت الحظر لـ ${device.name}'),
                  content: TextField(
                    controller: timeController,
                    decoration: const InputDecoration(
                      labelText: 'أدخل وقت الحظر (مثال: 22:00 - 06:00)',
                      border: OutlineInputBorder(),
                    ),
                  ),
                  actions: [
                    TextButton(
                      onPressed: () => Navigator.pop(dialogContext),
                      child: const Text('إلغاء'),
                    ),
                    ElevatedButton(
                      onPressed: () {
                        setState(() {
                          device.blockTime = timeController.text;
                        });
                        Navigator.pop(dialogContext);
                      },
                      child: const Text('حفظ'),
                    ),
                  ],
                );
              },
            );
          }
        }
        EOF

        flutter pub get
        flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
